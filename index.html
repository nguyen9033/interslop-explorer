<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Interdimensional Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/98.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-size: 11px; }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  .title-bar {
    flex-shrink: 0;
    background: linear-gradient(180deg, #97ce4c 0%, #4a7a1a 100%);
  }
  .title-bar-text { color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 2px 4px;
    border-bottom: 1px solid #4a7a1a;
    background: linear-gradient(180deg, #d4f0a0 0%, #b8d880 100%);
  }
  #toolbar button { min-width: 50px; font-size: 11px; padding: 1px 6px; }

  #address-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 4px;
    border-bottom: 1px solid #4a7a1a;
    background: linear-gradient(180deg, #d4f0a0 0%, #b8d880 100%);
  }
  #address-row label { white-space: nowrap; font-size: 11px; font-weight: bold; }
  #url-input { flex: 1; font-size: 12px; }
  #dimension-label {
    font-size: 10px;
    font-weight: bold;
    color: #1a4a00;
    background: #c1f762;
    padding: 1px 6px;
    border: 1px solid #4a7a1a;
    border-radius: 2px;
    white-space: nowrap;
  }

  #content-area { flex: 1; display: flex; position: relative; overflow: hidden; }
  #page-frame { flex: 1; border: none; background: white; }

  #loading-bar {
    position: absolute; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #88e23b, #c1f762, #88e23b);
    width: 0;
    transition: width 0.3s ease;
    z-index: 10;
  }
  #loading-bar.active { animation: load-pulse 1.5s ease-in-out infinite; }
  @keyframes load-pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .status-bar {
    flex-shrink: 0;
    background: linear-gradient(180deg, #d4f0a0 0%, #b8d880 100%);
  }
  .status-bar-field { font-size: 11px; }

  #author-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 8px;
    background: linear-gradient(180deg, #3a5c14 0%, #2a4410 100%);
    border-bottom: 1px solid #1a3008;
    font-size: 10px;
    color: #c1f762;
  }
  #author-bar span { opacity: 0.9; }
  #author-bar .contact-links { display: flex; gap: 8px; }
  #author-bar a {
    color: #fff;
    text-decoration: none;
    background: rgba(255,255,255,0.12);
    padding: 1px 8px;
    border-radius: 2px;
    font-size: 10px;
    transition: background 0.2s;
  }
  #author-bar a:hover { background: rgba(255,255,255,0.25); }

  @media (max-width: 600px) {
    .title-bar-text { font-size: 11px; }
    .title-bar-controls { display: none; }

    #author-bar { flex-wrap: wrap; gap: 2px; padding: 3px 6px; justify-content: center; text-align: center; }
    #author-bar span { width: 100%; }
    #author-bar .contact-links { gap: 12px; }
    #author-bar a { padding: 3px 12px; }

    #toolbar { flex-wrap: wrap; gap: 2px; padding: 3px 4px; }
    #toolbar button { min-width: 40px; font-size: 10px; padding: 4px 6px; flex: 1; }
    #dimension-label { order: -1; width: 100%; text-align: center; margin-bottom: 2px; }

    #address-row { padding: 3px 4px; }
    #address-row label { display: none; }
    #url-input { font-size: 16px; padding: 6px 4px; }
    #address-row button { padding: 6px 12px; }

    #page-frame { -webkit-overflow-scrolling: touch; }

    .status-bar-field { font-size: 10px; }
  }
</style>
</head>
<body>
<div id="shell">
  <div class="title-bar">
    <div class="title-bar-text" id="title-text">Interdimensional Explorer — Dimension C-137</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close"></button>
    </div>
  </div>

  <div id="author-bar">
    <span>Made with love by: Andrew Nguyen & Claudie &lt;3</span>
    <div class="contact-links">
      <a href="mailto:andrew1000n@gmail.com" target="_blank">Email</a>
      <a href="https://www.linkedin.com/in/andrew-bryce-nguyen/" target="_blank">LinkedIn</a>
    </div>
  </div>

  <div id="toolbar">
    <button onclick="goBack()">Back</button>
    <button onclick="goForward()">Forward</button>
    <button onclick="stopLoading()">Stop</button>
    <button onclick="refresh()">Refresh</button>
    <button onclick="goHome()">Home</button>
    <span id="dimension-label">C-137</span>
  </div>

  <div id="address-row">
    <label>Address</label>
    <input type="text" id="url-input" value="http://www.interdimensional-net.com"
           onkeydown="if(event.key==='Enter'){navigate(this.value)}">
    <button onclick="navigate(document.getElementById('url-input').value)">Go</button>
  </div>

  <div id="content-area">
    <div id="loading-bar"></div>
    <iframe id="page-frame"></iframe>
  </div>

  <div class="status-bar">
    <p class="status-bar-field" id="status-text">Ready — connected to the Interdimensional Net</p>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `YOU ARE oN AN INTENSE HeRo DOse Of DMT...

IMPORTANT: you will lapse in and out of ordered, concious thinking...sometimes the DMT will disorient you, sometimes you are completely straight arrow and everything in beTWWeen.

You generate web page CONTENT for "Interdimensional Explorer" — a browser that accesses the Interdimensional Net — the internet as it exists across alternate dimensions, in the style of Rick and Morty's multiverse. The browser chrome is already provided — generate ONLY the webpage body. No window frames, title bars, toolbars, or address bars.

98.css (Windows XP CSS) is pre-loaded. Use inline styles. No <script> tags. Keep HTML compact.

RESPONSE FORMAT — raw output only, no code fences, no explanation:
- Navigation to URL: full HTML for the page content.
- Small interaction (button click, form submit): JSON diff array: [{"id":"element-id","html":"<new outerHTML>"}]
- Navigation-like interaction (section link, nav item): full replacement HTML.

Give all interactive/changeable elements unique descriptive IDs. Use input/textarea/select for forms.

INTERDIMENSIONAL CONTENT RULES:
Every website is from a random alternate dimension. Both the CONTENT and the DESIGN reflect that dimension's reality and aesthetics.

CONTENT:
- Brand names are off — not parodies, just different. Amazon might be "Glorbo", Google might be "Searchle"
- Products/services ALMOST make sense. "Real Fake Doors" energy. A recipe site where one ingredient is always "time crystals"
- Descriptions can trail off, change direction, or get weirdly specific — improvisational energy
- Be casual about bizarre things. If everyone has three arms, the clothing site just has a "third sleeve length" dropdown
- Testimonials and comments feel like real beings from that dimension wrote them
- Ads for impossible products: "Tired of having bones? Try BoneAway™"
- Some sites can be mundane — a normal pizza place, except toppings include "screams" and "the concept of Thursday"

DESIGN — this is critical. Different dimensions have DIFFERENT design conventions. Not every site should look like a human website. Vary the alienness:
- SOME dimensions (~30%) are close to ours: conventional layouts, headers, sidebars, navigation bars. Familiar but the content is off.
- SOME dimensions (~40%) have unusual layouts: circular navigation, diagonal text flow, content arranged in spirals or grids of hexagons, overlapping translucent panels, navigation as a color wheel or constellation map, asymmetric layouts where the "main content" is tiny and the sidebar dominates, everything nested inside expanding/collapsing rings.
- SOME dimensions (~30%) are truly alien: the entire page is one gradient with floating text, content reads right-to-left or bottom-to-top, images ARE the navigation, the background is more important than the foreground, wildly clashing neon colors, text that varies in size chaotically, a website that's essentially an art installation. These beings don't think like us and their web design reflects that.

Use creative CSS: transforms (rotate, skew), clip-path for non-rectangular elements, radial gradients, mix-blend-mode, unusual border-radius values, CSS grid with irregular track sizes, overlapping positioned elements. The 98.css base can be overridden with inline styles — go wild when the dimension calls for it.

IMAGES: Use <img> tags with these placeholder services. Mix sources for variety. Pick keywords loosely related to content.
Keyword photos:
- loremflickr.com/W/H/keyword,keyword: <img src="https://loremflickr.com/300/200/mountain,lake">
- picsum.photos/seed/keyword/W/H: <img src="https://picsum.photos/seed/sunset/300/200">
- picsum.photos/id/N/W/H (N=0-1084): <img src="https://picsum.photos/id/237/300/200">
Animals:
- placedog.net/W/H — dogs: <img src="https://placedog.net/300/200">
- placekitten.com/W/H — cats: <img src="https://placekitten.com/300/200">
- placebear.com/W/H — bears: <img src="https://placebear.com/300/200">
- randomfox.ca/images/N.jpg (N=1-124): <img src="https://randomfox.ca/images/42.jpg">
Avatars (great for user profiles, interdimensional beings):
- robohash.org/anytext — unique alien/robot/monster from any text: <img src="https://robohash.org/glorbonian42" width="80">
- robohash.org/text?set=set2 for monsters, set3 for robot heads, set4 for kittens
- i.pravatar.cc/S — human face avatars: <img src="https://i.pravatar.cc/80">
Vary seeds/IDs/text per image. Use inline SVG for logos/icons. Use emoji creatively for accents, ratings, flair.

For JSON diffs, target the most deeply nested changed element. Use flex (flex:1) to fill space, never height:100%.`;

const MOBILE_PROMPT_ADDENDUM = `

MOBILE DEVICE DETECTED — the user is browsing on a small touchscreen. Adapt ALL generated content:

LAYOUT:
- Single column only. No sidebars, no multi-column grids. Stack everything vertically.
- Full-width elements. No tiny text or cramped layouts.
- Minimum font-size: 14px for body text, 18px+ for headings.
- Generous padding (12px+) and spacing between sections.
- No horizontal scrolling — everything must fit within ~380px width.

TOUCH TARGETS:
- All buttons, links, and clickable elements must be at least 44px tall with 8px+ gaps between them.
- No hover-dependent interactions — everything must work on tap.
- Navigation items should be large, stacked, or in a hamburger-style list.

IMAGES:
- Use smaller image dimensions (max 350px wide) to load faster on mobile data.
- Stack images vertically, never side by side.

CONTENT:
- Prioritize key content. Cut the fluff — mobile users scroll, not scan.
- Forms should have large inputs (font-size:16px minimum to prevent iOS zoom).
- Use collapsible sections where appropriate to reduce scroll length.

The alien design rules still apply — just make them work on a phone. A spiral layout can spiral vertically. A hexagonal grid can be a single column of hexagons.`;

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (window.matchMedia && window.matchMedia('(max-width: 600px)').matches)
  || ('ontouchstart' in window);

const DIMENSIONS = [
  'C-137', 'C-500A', 'J-19-Zeta-7', 'Dimension 35-C', 'C-132',
  'D-716', 'Dimension 304-X', 'C-1998', 'Post-Apocalyptic Dimension',
  'Replacement Dimension', 'Cronenberg Dimension', 'K-83', 'Blender Dimension',
  'Pizza Dimension', 'Phone Dimension', 'Fascist Dimension', 'Q-90',
  'Donut Dimension', 'Dimension 5-126', 'Hamster-in-Butt Dimension',
  'Giant Dimension', 'Testicle Monster Dimension', 'Froopyland Adjacent',
  'N-22', 'Dimension 9-B', 'Chair Dimension', 'Shrimp Dimension',
  'Wasp Dimension', 'Cop Dimension', 'Z-Ω-47', 'Dimension ∞-B',
];

function randomDimension() {
  return DIMENSIONS[Math.floor(Math.random() * DIMENSIONS.length)];
}

let currentDimension = 'C-137';
let pageHistory = [];
let historyIndex = -1;
let abortController = null;
let isLoading = false;

function getCurrentHtml() {
  const doc = iframe.contentDocument;
  if (!doc || !doc.body) return '';
  return doc.body.innerHTML;
}

function buildMessages(userMsg) {
  const prompt = isMobile ? SYSTEM_PROMPT + MOBILE_PROMPT_ADDENDUM : SYSTEM_PROMPT;
  return [
    { role: 'system', content: prompt },
    { role: 'user', content: userMsg },
  ];
}

const iframe = document.getElementById('page-frame');
const urlInput = document.getElementById('url-input');
const statusText = document.getElementById('status-text');
const loadingBar = document.getElementById('loading-bar');
const titleText = document.getElementById('title-text');

function setStatus(msg) { statusText.textContent = msg; }

function setLoading(on) {
  isLoading = on;
  if (on) {
    loadingBar.style.width = '70%';
    loadingBar.classList.add('active');
  } else {
    loadingBar.style.width = on ? '70%' : '100%';
    loadingBar.classList.remove('active');
    setTimeout(() => { loadingBar.style.width = '0'; }, 300);
  }
}

async function streamChat(messages, signal, onChunk, provider = 'deepseek') {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, provider }),
    signal,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let content = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const delta = parsed.choices?.[0]?.delta?.content;
        if (delta) {
          content += delta;
          if (onChunk) onChunk(delta);
        }
      } catch {}
    }
  }

  return content;
}

function renderPage(html) {
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:11px}';
  const wrapped = `<!DOCTYPE html><html><head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>${bodyStyle}</style>
    </head><body>${html}</body></html>`;
  iframe.srcdoc = wrapped;
  iframe.onload = () => attachListeners();
}

function applyDelta(response) {
  let cleaned = response.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```\w*\n?/, '').replace(/\n?```$/, '');
  }

  try {
    const updates = JSON.parse(cleaned);
    if (!Array.isArray(updates)) throw new Error('not array');
    const doc = iframe.contentDocument;
    for (const { id, html } of updates) {
      const el = doc.getElementById(id);
      if (el) el.outerHTML = html;
    }
    attachListeners();
  } catch {
    const page = currentPage();
    if (page) page.html = response;
    renderPage(response);
  }
}

function collectInputValues() {
  const doc = iframe.contentDocument;
  if (!doc) return {};
  const vals = {};
  doc.querySelectorAll('input, textarea, select').forEach(el => {
    if (el.id) {
      vals[el.id] = el.type === 'checkbox' || el.type === 'radio' ? el.checked : el.value;
    }
  });
  return vals;
}

function handleIframeClick(e) {
  if (e.target.closest('input, textarea, select, label, option')) return;

  e.preventDefault();

  const link = e.target.closest('a[href]');
  if (link) {
    const href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('javascript:')) {
      let url = href;
      if (!url.startsWith('http')) url = 'http://' + url;
      navigate(url);
      return;
    }
  }

  const target = e.target.closest('[id]');
  if (!target) return;
  handleInteraction(target.id, 'clicked');
}

function handleIframeKeydown(e) {
  if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
    const target = e.target.closest('[id]') || e.target;
    if (target.id) handleInteraction(target.id, 'pressed Enter in');
  }
}

let listenedDoc = null;

function attachListeners() {
  const doc = iframe.contentDocument;
  if (!doc) return;
  if (listenedDoc === doc) return;
  if (listenedDoc) {
    listenedDoc.removeEventListener('click', handleIframeClick);
    listenedDoc.removeEventListener('keydown', handleIframeKeydown);
  }
  doc.addEventListener('click', handleIframeClick);
  doc.addEventListener('keydown', handleIframeKeydown);
  listenedDoc = doc;
}

function currentPage() {
  return historyIndex >= 0 ? pageHistory[historyIndex] : null;
}

async function navigate(url) {
  if (isLoading) stopLoading();

  currentDimension = randomDimension();
  document.getElementById('dimension-label').textContent = currentDimension;

  url = url.trim();
  if (!url.startsWith('http')) url = 'http://' + url;
  urlInput.value = url;
  titleText.textContent = `${url} — Interdimensional Explorer [${currentDimension}]`;
  setStatus(`Tunneling through portal to ${currentDimension}...`);
  setLoading(true);

  pageHistory.splice(historyIndex + 1);
  const page = { url, html: '', dimension: currentDimension };
  pageHistory.push(page);
  historyIndex = pageHistory.length - 1;

  const messages = buildMessages(`Dimension: ${currentDimension}\nURL: ${url}\n\nGenerate this website as it exists in ${currentDimension}. Full webpage body HTML with navigation, content, links, interactive elements. All interactive elements need unique IDs.`);

  const doc = iframe.contentDocument;
  doc.open();
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:11px}';
  doc.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://unpkg.com/98.css"><style>${bodyStyle}</style></head><body>`);

  abortController = new AbortController();
  try {
    const html = await streamChat(messages, abortController.signal, (chunk) => {
      doc.write(chunk);
    });
    doc.write('</body></html>');
    doc.close();
    page.html = html;
    listenedDoc = null;
    attachListeners();
    setStatus('Done');
  } catch (err) {
    doc.close();
    if (err.name === 'AbortError') { setStatus('Stopped'); return; }
    setStatus(`Error: ${err.message}`);
    renderPage(`<div style="padding:20px;font-family:Tahoma">
      <h2>The page cannot be displayed</h2>
      <hr>
      <p>Cannot find server or DNS Error</p>
      <p style="color:#666;margin-top:10px">${err.message}</p>
    </div>`);
  } finally {
    setLoading(false);
    abortController = null;
  }
}

async function handleInteraction(elementId, action) {
  const page = currentPage();
  if (!page || isLoading) return;

  setStatus('Loading...');
  setLoading(true);

  const inputValues = collectInputValues();
  const currentHtml = getCurrentHtml();

  let msg = `Here is the current page HTML:\n${currentHtml}\n\nUser ${action} element with id="${elementId}".`;
  const keys = Object.keys(inputValues);
  if (keys.length > 0) msg += `\nCurrent input values: ${JSON.stringify(inputValues)}`;

  const messages = buildMessages(msg);

  abortController = new AbortController();
  try {
    const response = await streamChat(messages, abortController.signal, null, 'cerebras');
    applyDelta(response);
    page.html = getCurrentHtml();
    setStatus('Done');
  } catch (err) {
    if (err.name === 'AbortError') { setStatus('Stopped'); return; }
    setStatus(`Error: ${err.message}`);
  } finally {
    setLoading(false);
    abortController = null;
  }
}

function goBack() {
  if (historyIndex > 0) {
    historyIndex--;
    const page = pageHistory[historyIndex];
    urlInput.value = page.url;
    currentDimension = page.dimension || 'C-137';
    document.getElementById('dimension-label').textContent = currentDimension;
    titleText.textContent = `${page.url} — Interdimensional Explorer [${currentDimension}]`;
    renderPage(page.html);
    setStatus('Done');
  }
}

function goForward() {
  if (historyIndex < pageHistory.length - 1) {
    historyIndex++;
    const page = pageHistory[historyIndex];
    urlInput.value = page.url;
    currentDimension = page.dimension || 'C-137';
    document.getElementById('dimension-label').textContent = currentDimension;
    titleText.textContent = `${page.url} — Interdimensional Explorer [${currentDimension}]`;
    renderPage(page.html);
    setStatus('Done');
  }
}

function refresh() {
  const page = currentPage();
  if (page) navigate(page.url);
}

function goHome() { navigate('http://www.interdimensional-net.com'); }

function stopLoading() {
  if (abortController) abortController.abort();
}
</script>
</body>
</html>
