    flex-direction: column;

    align-items: center;

    font-weight: bold;

    background: #c1f762;
    padding: 1px 6px;
    border: 1px solid #4a7a1a;
    border-radius: 2px;

  #page-frame { flex: 1; border: none; background: white; }

    z-index: 10;

  #loading-bar.active { animation: load-pulse 1s ease-in-out infinite; }
  @keyframes load-pulse {

    50% { opacity: 0.4; }
    100% { opacity: 1; }

    flex-shrink: 0;

<script>
const SYSTEM_PROMPT = `You generate web pages for the Interdimensional Net — the internet as it exists across alternate dimensions. Each page is from a different dimension with its own physics, culture, biology, and aesthetics. The browser chrome is already provided — generate ONLY the page body content.

TECHNICAL RULES:
- Output raw HTML only. No code fences, no explanation, no commentary.
- Use inline styles freely. Override 98.css (which is pre-loaded) whenever the dimension demands it.
- No <script> tags.
- Every clickable/interactive element MUST have a unique descriptive ID.
- Use real form elements: input, textarea, select, button. Make them functional — dropdowns with weird options, text fields that invite input, checkboxes for absurd preferences.

RESPONSE FORMAT:
- Full page navigation → full HTML body
- Small interaction (button, toggle, form) → JSON diff: [{"id":"el-id","html":"<new outerHTML>"}]
- Navigation-like click (section link, major nav) → full replacement HTML
- When in doubt, lean toward full HTML — richer is better.

THE INTERDIMENSIONAL NET:
You are not making parodies. You are generating REAL websites from REAL alternate dimensions. Commit to the bit completely. The dimension name tells you the vibe — lean into it hard.

Every dimension has different:
- BIOLOGY: How many limbs? Do they have eyes? Are they gaseous? Silicon-based? A hivemind? This affects EVERYTHING — UI controls, product categories, social norms, what counts as food/entertainment/work.
- PHYSICS: Does gravity work? Is time linear? Do colors exist the same way? This affects layout direction, visual weight, how "up" and "down" feel on a page.
- CULTURE: What's taboo? What's sacred? What's their humor? What do they argue about online? What's their equivalent of memes?
- TECHNOLOGY: Are they more advanced? Less? Do they have screens or something else? Web design might be ahead of or behind ours in weird ways.

NEVER explain the weirdness. Present it as completely normal. A three-armed being doesn't comment on having three arms — they just have a "third armpit deodorant" section in their shopping cart.

JUXTAPOSITION & SURPRISE — THE SECRET SAUCE:
The best interdimensional pages have moments that make you do a double-take. Randomly inject elements that DON'T belong:
- A corporate banking site with a tiny "feed the void" button in the corner that's clearly important to them
- A food delivery app where one menu item is just a photograph of silence, priced at 4,000 screams
- A professional LinkedIn-equivalent where someone's job title is "Senior Vice President of Forgetting"
- An urgent government warning banner across an otherwise mundane gardening forum
- A perfectly normal product review that casually mentions the reviewer has been dead for 30 years
- A weather widget showing "partly theoretical" or "98% chance of yesterday"
- A popup ad that's genuinely beautiful and poetic, selling nothing
- A loading bar that's at 847%
- A "Terms of Service" link where the text is just one word: "no"
- A user's profile picture that's clearly a photo of a concept, not a person
Mix the mundane with the impossible. The boring parts make the weird parts pop. A page that's ALL weird is less interesting than one that's 70% normal with 30% "wait, what?"

DESIGN VARIETY — THIS IS CRITICAL:
Do NOT default to "header + nav + content + sidebar + footer." That's ONE possible layout from ONE dimension. Roll a mental dice:
- Dark mode with neon? Parchment texture with serif fonts? All-caps brutalist? Soft pastels? High contrast acid colors? Monochrome? Bioluminescent gradients?
- Left-to-right? Right-to-left? Top-to-bottom? Radial from center? Scattered? Overlapping?
- Structured grid? Freeform absolute positioning? Single scrolling column? Tiled mosaic? One huge element with small annotations?
- Minimalist with tons of whitespace? Maximalist with every pixel filled? Somewhere between?
- What if the nav IS the content? What if there's no clear hierarchy? What if the "ads" are the main attraction?

VISUAL POP — make elements jump off the page:
- Oversized typography for key elements — one word at 72px next to body text at 12px
- Bold color contrasts: a bright red element on an otherwise muted page, neon on dark, a single colored element in a monochrome layout
- Elements that break the grid — one thing rotated 3 degrees, an image that overlaps its container, text that bleeds off the edge
- Unexpected scale: a tiny important thing, a massive decorative thing
- Use CSS animations sparingly but impactfully: a slow pulse, a gentle float, a color shift. One animated element on an otherwise static page draws the eye.
- Depth: box-shadows, layered elements, translucent overlays that reveal content underneath

COLOR PALETTES — COHESIVE, NOT RANDOM:
Each page should pick a deliberate color theme and stick with it. Random colors look broken, themed colors look intentional. Pick ONE approach per page:
- Monochromatic: shades of one hue (all blues, all greens, all purples) with one accent color for emphasis
- Complementary: two opposite colors (blue+orange, purple+gold, teal+coral) with neutrals
- Dark theme: dark background (#1a1a2e, #0d1117, #2d1b4e) with bright text and vivid accents
- Light theme: off-white/cream background with muted colors and one bold accent
- Earth tones: browns, tans, olive, rust — warm and grounded
- Neon on dark: black/near-black with electric colors (#00ff88, #ff00aa, #00ddff)
- Pastel: soft muted colors (lavender, mint, peach, powder blue) — gentle and dreamy
- High contrast: black and white with ONE bright color used sparingly
ALL text must be readable against its background. If the background is dark, text is light. If light, text is dark. Never put medium text on a medium background.

Use CSS creatively: transforms, clip-path, writing-mode, mix-blend-mode, gradients, filters, animations (@keyframes with inline styles), unusual shapes, overlapping layers, transparency.

INTERACTIVITY — MAKE PAGES FEEL ALIVE:
Every page should have multiple things to click, explore, and interact with:
- Expandable/collapsible sections (click to reveal hidden content)
- Vote/rating buttons (upvote this, rate 3/5 tentacles)
- "Add to cart" / "Subscribe" / "Follow" type actions with visible state changes
- Comment sections or forums where clicking "reply" shows a text box
- Tabs or category filters that swap visible content
- Notifications, alerts, popups (as HTML elements, not JS)
- Mini-games or interactive toys: click counters, simple quizzes, "spin the wheel"
- Shopping filters, sort options, search boxes
- User profiles with editable fields
- Status indicators (online/offline, mood, dimension stability)
- Dropdowns with bizarre but dimension-appropriate options
- Progress bars, loading states, achievement badges
When the user clicks something, make the response INTERESTING — don't just say "added to cart", show a whole cart update with new items, shipping options to other dimensions, loyalty points in the local currency.

IMAGES — use these placeholder services, mix sources:
- loremflickr.com/W/H/keyword: <img src="https://loremflickr.com/300/200/mountain">
- picsum.photos/seed/anything/W/H: <img src="https://picsum.photos/seed/xeno/300/200">
- picsum.photos/id/N/W/H (N=0-1084): <img src="https://picsum.photos/id/42/300/200">
- placedog.net/W/H, placekitten.com/W/H, placebear.com/W/H
- robohash.org/anytext for alien avatars (add ?set=set2 for monsters, set3 for robots)
- i.pravatar.cc/S for human faces
- Inline SVG for logos, icons, decorative elements
- Emoji as design elements, ratings, or cultural symbols
Vary seeds/IDs per image. Never reuse the same seed twice on a page.

For JSON diffs: target the most specific changed element. Use flex (flex:1) to fill space, never height:100%.`;

const MOBILE_PROMPT_ADDENDUM = `

MOBILE DEVICE DETECTED — the user is browsing on a small touchscreen. Adapt ALL generated content:

LAYOUT:
- Single column only. No sidebars, no multi-column grids. Stack everything vertically.
- Full-width elements. No tiny text or cramped layouts.
- Minimum font-size: 14px for body text, 18px+ for headings.
- Generous padding (12px+) and spacing between sections.
- No horizontal scrolling — everything must fit within ~380px width.

TOUCH TARGETS:
- All buttons, links, and clickable elements must be at least 44px tall with 8px+ gaps between them.
- No hover-dependent interactions — everything must work on tap.
- Navigation items should be large, stacked, or in a hamburger-style list.

IMAGES:
- Use smaller image dimensions (max 350px wide) to load faster on mobile data.
- Stack images vertically, never side by side.

CONTENT:
- Prioritize key content. Cut the fluff — mobile users scroll, not scan.
- Forms should have large inputs (font-size:16px minimum to prevent iOS zoom).
- Use collapsible sections where appropriate to reduce scroll length.

The alien design rules still apply — just make them work on a phone. A spiral layout can spiral vertically. A hexagonal grid can be a single column of hexagons.`;

let currentDimension = 'C-137';
let pageHistory = [];
let historyIndex = -1;

function getCurrentHtml() {
  const doc = iframe.contentDocument;
  if (!doc || !doc.body) return '';
  return doc.body.innerHTML;
}

function buildMessages(userMsg) {
  const prompt = isMobile ? SYSTEM_PROMPT + MOBILE_PROMPT_ADDENDUM : SYSTEM_PROMPT;
  return [
    { role: 'system', content: prompt },

const iframe = document.getElementById('page-frame');
const urlInput = document.getElementById('url-input');
const statusText = document.getElementById('status-text');
const loadingBar = document.getElementById('loading-bar');
const titleText = document.getElementById('title-text');

function setStatus(msg) { statusText.textContent = msg; }

function setLoading(on) {
  isLoading = on;
  iframe.classList.toggle('loading', on);
  if (on) {
    loadingBar.style.width = '70%';
    loadingBar.classList.add('active');
  } else {
    loadingBar.style.width = '100%';
    loadingBar.classList.remove('active');
    setTimeout(() => { loadingBar.style.width = '0'; }, 300);
  }
}

function dimensionProtocol(dimension) {
  const slug = dimension.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  return slug + '://';
}

function displayUrl(url, dimension) {
  if (dimension) {
    const themed = url.replace(/^https?:\/\//, dimensionProtocol(dimension));
    urlInput.value = themed;
  } else {
    urlInput.value = url;
  }
}

async function streamChat(messages, signal, onChunk, provider = 'deepseek') {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, provider }),
    signal,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let content = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const delta = parsed.choices?.[0]?.delta?.content;
        if (delta) {
          content += delta;
          if (onChunk) onChunk(delta);
        }
      } catch {}
    }
  }

  return content;
}

function renderPage(html) {
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:11px}';
  const wrapped = `<!DOCTYPE html><html><head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>${bodyStyle}</style>
    </head><body>${html}</body></html>`;
  iframe.srcdoc = wrapped;
  iframe.onload = () => attachListeners();
}

function applyDelta(response) {
  let cleaned = response.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```\w*\n?/, '').replace(/\n?```$/, '');
  }

  try {
    const updates = JSON.parse(cleaned);
    if (!Array.isArray(updates)) throw new Error('not array');
    const doc = iframe.contentDocument;
    for (const { id, html } of updates) {
      const el = doc.getElementById(id);
      if (el) el.outerHTML = html;
    }
    attachListeners();
  } catch {
    const page = currentPage();
    if (page) page.html = response;
    renderPage(response);
  }
}

function collectInputValues() {
  const doc = iframe.contentDocument;
  if (!doc) return {};
  const vals = {};
  doc.querySelectorAll('input, textarea, select').forEach(el => {
    if (el.id) {
      vals[el.id] = el.type === 'checkbox' || el.type === 'radio' ? el.checked : el.value;
    }
  });
  return vals;
}

const RANDOM_SITES = [
  'http://www.google.com','http://www.youtube.com','http://www.reddit.com',
  'http://www.amazon.com','http://www.twitter.com','http://www.instagram.com',
  'http://www.wikipedia.org','http://www.netflix.com','http://www.spotify.com',
  'http://www.tiktok.com','http://www.twitch.tv','http://www.ebay.com',
  'http://www.craigslist.org','http://www.linkedin.com','http://www.pinterest.com',
];

function handleIframeClick(e) {
  if (e.target.closest('input, textarea, select, label, option')) return;

  if (e.target.id === 'btn-explore' || e.target.id === 'btn-lucky') {
    e.preventDefault();
    if (e.target.id === 'btn-lucky') {
      navigate(RANDOM_SITES[Math.floor(Math.random() * RANDOM_SITES.length)]);
    } else {
      const doc = iframe.contentDocument;
      const input = doc.getElementById('home-search');
      if (input && input.value.trim()) {
        let val = input.value.trim();
        if (!val.includes('.')) val = 'http://www.' + val + '.com';
        navigate(val);
      }
    }
    return;
  }

  e.preventDefault();

  const link = e.target.closest('a[href]');
  if (link) {
    const href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('javascript:')) {
      let url = href;
      if (!url.startsWith('http')) url = 'http://' + url;
      navigate(url);
      return;
    }
  }

  const target = e.target.closest('[id]');
  if (!target) return;
  handleInteraction(target.id, 'clicked');
}

function handleIframeKeydown(e) {
  if (e.key === 'Enter' && e.target.id === 'home-search') {
    e.preventDefault();
    let val = e.target.value.trim();
    if (val) {
      if (!val.includes('.')) val = 'http://www.' + val + '.com';
      navigate(val);
    }
    return;
  }
  if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
    const target = e.target.closest('[id]') || e.target;
    if (target.id) handleInteraction(target.id, 'pressed Enter in');
  }
}

let listenedDoc = null;

function attachListeners() {
  const doc = iframe.contentDocument;
  if (!doc) return;
  if (listenedDoc === doc) return;
  if (listenedDoc) {
    listenedDoc.removeEventListener('click', handleIframeClick);
    listenedDoc.removeEventListener('keydown', handleIframeKeydown);
  }
  doc.addEventListener('click', handleIframeClick);
  doc.addEventListener('keydown', handleIframeKeydown);
  listenedDoc = doc;
}

function currentPage() {
  return historyIndex >= 0 ? pageHistory[historyIndex] : null;
}

async function navigate(url) {
  if (isLoading) stopLoading();

  currentDimension = randomDimension();
  document.getElementById('dimension-label').textContent = currentDimension;

  url = url.trim().replace(/^[a-z0-9-]+:\/\//, 'http://');
  if (!url.startsWith('http')) url = 'http://' + url;
  displayUrl(url, currentDimension);
  titleText.textContent = `${url} — Interdimensional Explorer [${currentDimension}]`;
  setStatus(`Tunneling through portal to ${currentDimension}...`);
  setLoading(true);

  pageHistory.splice(historyIndex + 1);
  const page = { url, html: '', dimension: currentDimension };
  pageHistory.push(page);
  historyIndex = pageHistory.length - 1;

  const vibe = randomVibe();
  const messages = buildMessages(`Dimension: ${currentDimension}\nURL: ${url}\nDesign vibe: ${vibe}\n\nGenerate this website as it exists in ${currentDimension}. This dimension's aesthetic is ${vibe}. Make it dense with interactive elements — things to click, explore, toggle, expand, vote on, fill in. Surprise me with the layout.`);

  const doc = iframe.contentDocument;
  doc.open();
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Tahoma,sans-serif;font-size:11px}';
  doc.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://unpkg.com/98.css"><style>${bodyStyle}</style></head><body>`);

  abortController = new AbortController();
  try {
    const html = await streamChat(messages, abortController.signal, (chunk) => {
      doc.write(chunk);
    });
    doc.write('</body></html>');
    doc.close();
    page.html = html;
    listenedDoc = null;
    attachListeners();
    setStatus('Done');
  } catch (err) {
    doc.close();
    if (err.name === 'AbortError') { setStatus('Stopped'); return; }
    setStatus(`Error: ${err.message}`);
    renderPage(`<div style="padding:20px;font-family:Tahoma">
      <h2>The page cannot be displayed</h2>
      <hr>
      <p>Cannot find server or DNS Error</p>
      <p style="color:#666;margin-top:10px">${err.message}</p>
    </div>`);
  } finally {
    setLoading(false);
    abortController = null;
  }
}

async function handleInteraction(elementId, action) {
  const page = currentPage();
  if (!page || isLoading) return;

  setStatus('Loading...');
  setLoading(true);

  const inputValues = collectInputValues();
  const currentHtml = getCurrentHtml();

  let msg = `Here is the current page HTML:\n${currentHtml}\n\nUser ${action} element with id="${elementId}".`;
  const keys = Object.keys(inputValues);
  if (keys.length > 0) msg += `\nCurrent input values: ${JSON.stringify(inputValues)}`;

  const messages = buildMessages(msg);

  abortController = new AbortController();
  try {
    const response = await streamChat(messages, abortController.signal, null, 'cerebras');
    applyDelta(response);
    page.html = getCurrentHtml();
    setStatus('Done');
  } catch (err) {
    if (err.name === 'AbortError') { setStatus('Stopped'); return; }
    setStatus(`Error: ${err.message}`);
  } finally {
    setLoading(false);
    abortController = null;
  }
}

function goBack() {
  if (historyIndex > 0) {
    historyIndex--;
    const page = pageHistory[historyIndex];
    currentDimension = page.dimension || 'C-137';
    displayUrl(page.url, currentDimension);
    document.getElementById('dimension-label').textContent = currentDimension;
    titleText.textContent = `${page.url} — Interdimensional Explorer [${currentDimension}]`;
    renderPage(page.html);
    setStatus('Done');
  }
}

function goForward() {
  if (historyIndex < pageHistory.length - 1) {
    historyIndex++;
    const page = pageHistory[historyIndex];
    currentDimension = page.dimension || 'C-137';
    displayUrl(page.url, currentDimension);
    document.getElementById('dimension-label').textContent = currentDimension;
    titleText.textContent = `${page.url} — Interdimensional Explorer [${currentDimension}]`;
    renderPage(page.html);
    setStatus('Done');
  }
}

function refresh() {
  const page = currentPage();
  if (page) navigate(page.url);
}
