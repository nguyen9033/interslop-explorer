<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Interdimensional Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/xp.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700;800&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
  }

  .window {
    display: flex;
    flex-direction: column;
    height: 100%;
    border-radius: 0;
    margin: 0;
  }

  #address-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 6px;
    background: linear-gradient(to bottom, #f2f6fc, #e1e6f0, #d6dce8);
    border-bottom: 1px solid #a4aeb8;
    border-top: 1px solid #fff;
    flex-shrink: 0;
  }
  #address-row label { white-space: nowrap; font-size: 11px; font-weight: bold; color: #333; }
  #address-row button {
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    min-width: 30px;
    text-align: center;
  }
  #url-input { flex: 1; font-size: 12px; padding: 3px 6px; }

  #content-area { flex: 1; display: flex; position: relative; overflow: hidden; }
  #page-frame { flex: 1; border: none; background: white; }

  #loading-bar {
    position: absolute; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #28b528, #7bea7b, #28b528);
    box-shadow: 0 0 6px rgba(40,181,40,0.5);
    width: 0;
    transition: width 0.3s ease;
    z-index: 10;
  }
  #loading-bar.active { animation: load-pulse 1s ease-in-out infinite; }
  @keyframes load-pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .status-bar { flex-shrink: 0; }
  #author-credit { font-size: 11px; color: #666; white-space: nowrap; }
  #author-credit a { color: #0066cc; text-decoration: none; }
  #author-credit a:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    .title-bar-controls { display: none; }
    .title-bar-text { font-size: 12px; }
    #address-row label { display: none; }
    #address-row button { padding: 5px 10px; font-size: 13px; min-width: 34px; }
    #url-input { font-size: 16px; padding: 5px 8px; }
    #page-frame { -webkit-overflow-scrolling: touch; }
    .status-bar { display: none !important; }
    #title-credit { display: none !important; }
  }
</style>
</head>
<body>
<div id="shell">
  <div class="window" style="display:flex;flex-direction:column;height:100%;border-radius:0;margin:0">
    <div class="title-bar" style="position:relative">
      <div class="title-bar-text" id="title-text">Interdimensional Explorer</div>
      <div id="title-credit" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:rgba(255,255,255,0.85);white-space:nowrap;pointer-events:auto">
        Made with love by: Andrew Nguyen & Claude · <a href="mailto:andrew1000n@gmail.com" style="color:rgba(255,255,255,0.9);text-decoration:none">Email</a> · <a href="https://www.linkedin.com/in/andrew-bryce-nguyen/" style="color:rgba(255,255,255,0.9);text-decoration:none">LinkedIn</a> · <a href="https://x.com/TechBurner88888" style="color:rgba(255,255,255,0.9);text-decoration:none">X</a>
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>

    <div id="address-row">
      <button onclick="goBack()" title="Back">◄</button>
      <button onclick="goHome()" title="Home">🏠</button>
      <label>Address</label>
      <div style="flex:1;position:relative;display:flex;align-items:center">
        <input type="text" id="url-input" value="http://www.interdimensional-net.com"
               onkeydown="if(event.key==='Enter'){navigate(this.value)}" style="width:100%;padding-right:22px">
        <span id="url-clear" onclick="document.getElementById('url-input').value='';document.getElementById('url-input').focus()" style="position:absolute;right:4px;cursor:pointer;color:#999;font-size:12px;line-height:1;user-select:none">✕</span>
      </div>
    </div>

    <div id="content-area">
      <div id="loading-bar"></div>
      <iframe id="page-frame"></iframe>
    </div>

    <div class="status-bar" style="display:flex;justify-content:space-between;align-items:center">
      <p class="status-bar-field" id="status-text" style="flex:1">Ready</p>
      <p class="status-bar-field" id="author-credit">Made with love by: Andrew Nguyen & Claude · <a href="mailto:andrew1000n@gmail.com">Email</a> · <a href="https://www.linkedin.com/in/andrew-bryce-nguyen/">LinkedIn</a> · <a href="https://x.com/TechBurner88888">X</a></p>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You generate web pages from a parallel alien internet. Output ONLY raw HTML body content. No code fences.

This is a real website that is almost exactly like our world. Almost. Maybe one thing is different — a unit of measurement, a social norm, what a common word means, how a body part works, what day of the week it is, what gravity does. Maybe a few things. It varies. The site itself is completely normal and professional. The differences are never acknowledged or explained — they're woven into the details like they've always been there. You have to actually read to catch them.

Build it like a real alien web developer who's proud of their work. Specific names, real-feeling brands, actual prices, genuine reviews. Everything is earnest. Nothing is parody.

The tone is deadpan. The layout is professional. The details reward close reading. The reader should be halfway through before something makes them chuckle, then go back and reread. The humor is dry, oblique, and buried with slight innuendo — the kind that gets funnier the more you think about it. Situations should be 70% grounded in our world and 30% in bizarrely funny unscripted riffing from a dimension different from our own.

Raw Improv: The voice actors riffed and stumbled over their lines, leaving genuine laugh-breaks and awkward pauses in the final cut. It feels like a group of friends joking around on a couch rather than a meticulously scripted cartoon.
Visual Absurdity: The animators were given total freedom to bring these nonsensical pitches to life. The mismatch between the bizarre voice acting and wildly imaginative visuals creates a surreal comedic contrast. 
Mundane Tropes Turned Sci-Fi: The bits parody standard television formats (like commercials, movie trailers, or sitcoms) but twist them into bizarre, existential, or mildly disturbing variations.

IMPORTANT: DEPTH — THIS IS A RABBIT HOLE:
Every page is a branching tree. Pack it with real-feeling <a href="http://..."> links: nav menus with 5+ items, sidebar links, footer links, "related" sections, usernames that link to profiles, product categories, comment threads, "See more" links, ad banners, breadcrumbs, popups that lead to different websites. Each href should be a plausible URL. The user must ALWAYS have somewhere deeper to click. Think about how real websites work — every page has dozens of paths forward.

RULES:
- XP.css is pre-loaded. Use its classes AND inline styles.
- Unique IDs on interactive elements. Real form elements.
- Elements with onclick → your JS. Elements with id, no onclick → AI handles on click.
- Interactions: JSON diff [{"id":"x","html":"<outerHTML>"}] for small changes, full HTML for big.

ALIVE — FEWER ELEMENTS, MORE LIFE:
Make fewer things that RESPOND rather than many static ones. Inline onclick: counters that increment, toggles that flip, sections that expand/collapse, buttons that change. ONE <script> at the end (under 6 lines) if needed. No libs, no fetch.

DESIGN: Strong palette, committed. One CSS animation. Vary layouts. XP.css windows, tabs, fieldsets where they fit. Readable text.

IMAGES ARE MANDATORY — real websites are visual. Every page needs 4+ images minimum. Use them everywhere: hero banners, product photos, thumbnails, avatars, ad banners, background headers, gallery grids, user photos, logos, icons. A page without images looks broken.

VISUAL ABSURDITY through mismatch: The images are stock photos, but USE them wrong. A gorgeous sunset as "our new dental floss." A close-up of concrete labeled "Chef's Special." A random bridge captioned "Customer photo: fits perfectly!" The image is always a real, normal photo — the comedy is the deadpan context it appears in. Use loremflickr keywords that DON'T match: a cooking site with /construction, a tech blog with /kitten, a news article with /abstract. Captions and alt text should treat the mismatch as completely normal. Never acknowledge the disconnect.

Sources (vary the seed/keyword EVERY time — never reuse):
- picsum.photos/seed/UNIQUEWORD/W/H — photos (change UNIQUEWORD for each: sunset, office7, bread, city42, lamp3, river, shoes, tower)
- loremflickr.com/W/H/KEYWORD — use MISMATCHED keywords for comedy (a product page with /volcano, a profile pic with /highway)
- i.pravatar.cc/SIZE?u=UNIQUENAME — user avatars (change UNIQUENAME each time)
- robohash.org/WORD?set=set1 through set4 — robots/monsters/heads
- placehold.co/WxH/HEX/HEX?text=TEXT — branded placeholders with absurd ad copy
- placekitten.com/W/H, placebear.com/W/H, placedog.net/W/H — animals used deadpan as product photos, hero images, news photos
- dummyimage.com/WxH/BG/TEXT — colored banners with bizarre slogans
- Inline SVG for icons, logos, decorative elements — make them slightly wrong (5-pointed logo described as hexagonal, arrows pointing the wrong way)
- Mix sources on the same page. Use different dimensions. Always unique seeds.`;

const DESKTOP_PROMPT_ADDENDUM = `
DESKTOP: Use the full width. Multi-column layouts, sidebars, grids. Min font 12px. Hover states welcome. XP.css windows-within-windows encouraged.`;

const MOBILE_PROMPT_ADDENDUM = `
MOBILE: Single column. Min font 14px, touch targets 44px+, no hover. Max-width 380px. Images max 350px. Inputs font-size:16px. Generous padding. Collapsible sections.`;

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (window.matchMedia && window.matchMedia('(max-width: 600px)').matches)
  || ('ontouchstart' in window);

function randomDimension() {
  const r = Math.random();
  const n = Math.floor(Math.random() * 9999);
  const l = String.fromCharCode(65 + Math.floor(Math.random() * 26));
  if (r < 0.4) return l + '-' + n;
  if (r < 0.7) return 'Dimension ' + n + '-' + l;
  const greek = 'αβγδεζηθΣΩΔΨΞΦ';
  return greek[Math.floor(Math.random() * greek.length)] + '-' + Math.floor(Math.random() * 99);
}

let currentDimension = '';
let pageHistory = [];
let historyIndex = -1;
let abortController = null;
let isLoading = false;

function getCurrentHtml() {
  const doc = iframe.contentDocument;
  if (!doc || !doc.body) return '';
  return doc.body.innerHTML;
}

function buildMessages(userMsg) {
  const prompt = SYSTEM_PROMPT + (isMobile ? MOBILE_PROMPT_ADDENDUM : DESKTOP_PROMPT_ADDENDUM);
  return [
    { role: 'system', content: prompt },
    { role: 'user', content: userMsg },
  ];
}

const iframe = document.getElementById('page-frame');
const urlInput = document.getElementById('url-input');
const statusText = document.getElementById('status-text');
const loadingBar = document.getElementById('loading-bar');
const titleText = document.getElementById('title-text');

function setStatus(msg) { statusText.textContent = msg; }

function setLoading(on) {
  isLoading = on;
  if (on) {
    loadingBar.style.width = '70%';
    loadingBar.classList.add('active');
  } else {
    loadingBar.style.width = '100%';
    loadingBar.classList.remove('active');
    setTimeout(() => { loadingBar.style.width = '0'; }, 300);
  }
}

function dimensionProtocol(dimension) {
  const slug = dimension.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  return slug + '://';
}

function displayUrl(url, dimension) {
  if (dimension) {
    urlInput.value = url.replace(/^https?:\/\//, dimensionProtocol(dimension));
  } else {
    urlInput.value = url;
  }
}

async function streamChat(messages, signal, onChunk, provider = 'deepseek') {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, provider }),
    signal,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let content = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const delta = parsed.choices?.[0]?.delta?.content;
        if (delta) {
          content += delta;
          if (onChunk) onChunk(delta);
        }
      } catch {}
    }
  }

  return content;
}

function renderPage(html) {
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Segoe UI,Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Segoe UI,Tahoma,sans-serif;font-size:12px}#home-credit{display:none}';
  const wrapped = `<!DOCTYPE html><html><head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <style>${bodyStyle}</style>
    </head><body>${html}</body></html>`;
  iframe.srcdoc = wrapped;
  iframe.onload = () => attachListeners();
}

function applyDelta(response) {
  let cleaned = response.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```\w*\n?/, '').replace(/\n?```$/, '');
  }

  try {
    const updates = JSON.parse(cleaned);
    if (!Array.isArray(updates)) throw new Error('not array');
    const doc = iframe.contentDocument;
    for (const { id, html } of updates) {
      const el = doc.getElementById(id);
      if (el) el.outerHTML = html;
    }
    attachListeners();
  } catch {
    const page = currentPage();
    if (page) page.html = response;
    renderPage(response);
  }
}

function collectInputValues() {
  const doc = iframe.contentDocument;
  if (!doc) return {};
  const vals = {};
  doc.querySelectorAll('input, textarea, select').forEach(el => {
    if (el.id) {
      vals[el.id] = el.type === 'checkbox' || el.type === 'radio' ? el.checked : el.value;
    }
  });
  return vals;
}

function randomSite() {
  const real = ['google.com','youtube.com','reddit.com','amazon.com','twitter.com','instagram.com',
    'wikipedia.org','netflix.com','spotify.com','tiktok.com','twitch.tv','ebay.com','craigslist.org',
    'linkedin.com','pinterest.com','github.com','stackoverflow.com','weather.com','nytimes.com',
    'cnn.com','walmart.com','target.com','yelp.com','imdb.com','espn.com','hulu.com',
    'airbnb.com','uber.com','zillow.com','etsy.com','kickstarter.com','soundcloud.com',
    'tumblr.com','flickr.com','deviantart.com','buzzfeed.com','vice.com','wired.com',
    'techcrunch.com','mashable.com','webmd.com','mayoclinic.org','allrecipes.com',
    'epicurious.com','tripadvisor.com','booking.com','expedia.com','kayak.com'];
  const nouns = ['spoon','pillow','gravity','sock','bread','doorknob','elbow','cloud','sandwich',
    'penguin','toaster','umbrella','whisper','bucket','noodle','trampoline','harmonica','blanket',
    'cactus','pickle','waffle','spaghetti','hamster','volcano','mittens','pudding','kazoo',
    'turnip','lobster','crayon','muffin','tadpole','blimp','cheese','pretzel','yodel'];
  const adj = ['forbidden','infinite','moist','haunted','sentient','backwards','upside-down',
    'vintage','turbo','mega','ultra','quantum','cosmic','tiny','enormous','suspicious',
    'emotional','professional','competitive','underground','artisanal','organic','tactical'];
  const tlds = ['.com','.org','.net','.io','.co','.biz','.info','.club','.zone','.world',
    '.exchange','.academy','.supplies','.report','.institute','.gallery','.wiki','.reviews'];
  const formats = [
    () => 'http://www.' + real[Math.floor(Math.random() * real.length)],
    () => 'http://www.' + pick(adj) + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(nouns) + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(nouns) + '-' + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(adj) + '-' + pick(nouns) + '-' + pick(adj).replace('-','') + pick(tlds),
    () => 'http://www.the' + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(nouns) + 'hub' + pick(tlds),
    () => 'http://www.my' + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(adj) + pick(nouns) + 'reviews' + pick(tlds),
    () => 'http://www.rate-my-' + pick(nouns) + pick(tlds),
    () => 'http://www.' + pick(nouns) + 'facts' + pick(tlds),
    () => 'http://www.daily' + pick(nouns) + pick(tlds),
  ];
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  return pick(formats)();
}

function handleIframeClick(e) {
  if (e.target.closest('input, textarea, select, label, option')) return;

  if (e.target.id === 'btn-explore' || e.target.id === 'btn-lucky') {
    e.preventDefault();
    if (e.target.id === 'btn-lucky') {
      navigate(randomSite());
    } else {
      const doc = iframe.contentDocument;
      const input = doc.getElementById('home-search');
      if (input && input.value.trim()) {
        let val = input.value.trim();
        if (!val.includes('.')) val = 'http://www.' + val + '.com';
        navigate(val);
      }
    }
    return;
  }

  const link = e.target.closest('a[href]');
  if (link) {
    const href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('javascript:')) {
      e.preventDefault();
      let url = href;
      if (!url.startsWith('http')) url = 'http://' + url;
      navigate(url);
      return;
    }
  }

  const clickable = e.target.closest('[onclick]');
  if (clickable) return;

  const target = e.target.closest('[id]');
  if (!target) return;
  if (target.onclick || target.hasAttribute('onclick')) return;

  e.preventDefault();
  handleInteraction(target.id, 'clicked');
}

function handleIframeKeydown(e) {
  if (e.key === 'Enter' && e.target.id === 'home-search') {
    e.preventDefault();
    let val = e.target.value.trim();
    if (val) {
      if (!val.includes('.')) val = 'http://www.' + val + '.com';
      navigate(val);
    }
    return;
  }
  if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
    const target = e.target.closest('[id]') || e.target;
    if (target.id) handleInteraction(target.id, 'pressed Enter in');
  }
}

let listenedDoc = null;

function attachListeners() {
  const doc = iframe.contentDocument;
  if (!doc) return;
  if (listenedDoc === doc) return;
  if (listenedDoc) {
    listenedDoc.removeEventListener('click', handleIframeClick);
    listenedDoc.removeEventListener('keydown', handleIframeKeydown);
  }
  doc.addEventListener('click', handleIframeClick);
  doc.addEventListener('keydown', handleIframeKeydown);
  listenedDoc = doc;
}

function currentPage() {
  return historyIndex >= 0 ? pageHistory[historyIndex] : null;
}

async function navigate(url) {
  if (isLoading) stopLoading();

  currentDimension = randomDimension();

  url = url.trim().replace(/^[a-z0-9-]+:\/\//, 'http://');
  if (!url.startsWith('http')) url = 'http://' + url;
  displayUrl(url, currentDimension);
  titleText.textContent = `${url} — [${currentDimension}]`;
  setStatus(`Connecting to ${currentDimension}...`);
  setLoading(true);

  pageHistory.splice(historyIndex + 1);
  const page = { url, html: '', dimension: currentDimension };
  pageHistory.push(page);
  historyIndex = pageHistory.length - 1;

  const messages = buildMessages(`URL: ${url}`);

  const doc = iframe.contentDocument;
  doc.open();
  const bodyStyle = isMobile
    ? 'body{margin:8px;font-family:Segoe UI,Tahoma,sans-serif;font-size:14px}*{-webkit-tap-highlight-color:rgba(0,0,0,0.1)}img{max-width:100%;height:auto}'
    : 'body{margin:8px;font-family:Segoe UI,Tahoma,sans-serif;font-size:12px}';
  doc.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://unpkg.com/xp.css"><style>${bodyStyle}</style></head><body>`);
  listenedDoc = null;
  attachListeners();

  let lastErr = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    if (attempt > 0) {
      setStatus(`Retrying ${currentDimension}...`);
      const retryDoc = iframe.contentDocument;
      retryDoc.open();
      retryDoc.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="https://unpkg.com/xp.css"><style>${bodyStyle}</style></head><body>`);
      listenedDoc = null;
      attachListeners();
    }
    abortController = new AbortController();
    try {
      const currentDoc = iframe.contentDocument;
      const html = await streamChat(messages, abortController.signal, (chunk) => {
        currentDoc.write(chunk);
      });
      currentDoc.write('</body></html>');
      currentDoc.close();
      page.html = html;
      listenedDoc = null;
      attachListeners();
      setStatus('Done');
      lastErr = null;
      break;
    } catch (err) {
      iframe.contentDocument.close();
      if (err.name === 'AbortError') { setStatus('Stopped'); setLoading(false); abortController = null; return; }
      lastErr = err;
    }
  }
  if (lastErr) {
    setStatus(`Error: ${lastErr.message}`);
    renderPage(`<div style="padding:20px;font-family:Segoe UI,sans-serif">
      <h2 style="font-size:14px">This page can't be displayed</h2>
      <hr style="border:none;border-top:1px solid #ccc;margin:8px 0">
      <p>The connection was reset.</p>
      <p style="color:#888;margin-top:8px;font-size:11px">${lastErr.message}</p>
      <button onclick="parent.navigate('${url.replace(/'/g, "\\'")}')" style="margin-top:12px;padding:6px 16px;cursor:pointer">Try Again</button>
    </div>`);
  }
  setLoading(false);
  abortController = null;
}

async function handleInteraction(elementId, action) {
  const page = currentPage();
  if (!page || isLoading) return;

  setStatus('Loading...');
  setLoading(true);

  const inputValues = collectInputValues();
  const currentHtml = getCurrentHtml();

  let msg = `${currentHtml}\n\nUser ${action} #${elementId}.`;
  const keys = Object.keys(inputValues);
  if (keys.length > 0) msg += ` Inputs: ${JSON.stringify(inputValues)}`;

  const messages = buildMessages(msg);

  abortController = new AbortController();
  try {
    const response = await streamChat(messages, abortController.signal, null, 'deepseek');
    applyDelta(response);
    page.html = getCurrentHtml();
    setStatus('Done');
  } catch (err) {
    if (err.name === 'AbortError') { setStatus('Stopped'); return; }
    setStatus(`Error: ${err.message}`);
  } finally {
    setLoading(false);
    abortController = null;
  }
}

function goBack() {
  if (historyIndex > 0) {
    historyIndex--;
    const page = pageHistory[historyIndex];
    currentDimension = page.dimension || '';
    displayUrl(page.url, currentDimension || null);
    titleText.textContent = currentDimension
      ? `${page.url} — [${currentDimension}]`
      : 'Interdimensional Explorer';
    renderPage(page.html);
    setStatus('Done');
  }
}

function goHome() {
  if (isLoading) stopLoading();
  const url = 'http://www.interdimensional-net.com';
  displayUrl(url, null);
  urlInput.value = url;
  titleText.textContent = 'Interdimensional Explorer';

  pageHistory.splice(historyIndex + 1);
  pageHistory.push({ url, html: HOME_PAGE, dimension: null });
  historyIndex = pageHistory.length - 1;

  renderPage(HOME_PAGE);
  setStatus('Ready');
  setTimeout(() => {
    const doc = iframe.contentDocument;
    if (!doc) return;
    const btn = doc.getElementById('btn-lucky');
    if (!btn) return;
    const style = doc.createElement('style');
    style.textContent = '@keyframes squanchy-glow{0%,100%{box-shadow:0 0 4px 1px rgba(255,200,0,0.3),0 0 8px 2px rgba(255,200,0,0.15)}50%{box-shadow:0 0 10px 3px rgba(255,200,0,0.6),0 0 20px 6px rgba(255,200,0,0.3)}}';
    doc.head.appendChild(style);
    btn.style.animation = 'squanchy-glow 2s ease-in-out infinite';
    btn.style.borderColor = '#e6b800';
  }, 2000);
}

function stopLoading() {
  if (abortController) abortController.abort();
}

if (isMobile) {
  document.body.classList.add('mobile');
}

goHome();
